<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Conheça os Alunos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/stylePersonagem.css">

    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>


    <!-- ================================================= -->
    <!-- FUNDO -->
    <!-- ================================================= -->

    <!-- 
        COLOQUE SUA IMAGEM DE FUNDO AQUI NO CSS
        Exemplo:
        background-image: url('../assets/fundo.png');
    -->


    <div class="container">


        <!-- ================================================= -->
        <!-- TÍTULO -->
        <!-- ================================================= -->

        <div class="titulo">

            <h1>Conheça os Alunos</h1>

            <p>
                Clique em um monstrinho para descobrir mais sobre ele.
            </p>

        </div>



        <!-- ================================================= -->
        <!-- CARDS DOS PERSONAGENS -->
        <!-- ================================================= -->

        <div class="cards">


            <!-- ================================================= -->
            <!-- FRANKIE -->
            <!-- ================================================= -->

            <div class="card" onclick="mostrarAluno('frankie')">


                <!-- 
                    IMAGEM DA PERSONAGEM
                    Troque pela sua imagem
                -->

                <img src="" alt="Frankie">


                <!-- 
                    SKULL DA PERSONAGEM
                    COLOQUE A IMAGEM DA SKULL AQUI
                -->

                <div class="skull">

                    <img src="" alt="Skull Frankie">

                </div>


                <div class="nome">

                    Frankie Stein

                </div>

            </div>




            <!-- ================================================= -->
            <!-- DRACULAURA -->
            <!-- ================================================= -->

            <div class="card" onclick="mostrarAluno('draculaura')">


                <!-- IMAGEM DA PERSONAGEM -->
                <img src="" alt="Draculaura">


                <!-- SKULL -->
                <div class="skull">

                    <img src="" alt="Skull Draculaura">

                </div>


                <div class="nome">

                    Draculaura

                </div>

            </div>





            <!-- ================================================= -->
            <!-- CLAWDEEN -->
            <!-- ================================================= -->

            <div class="card" onclick="mostrarAluno('clawdeen')">


                <!-- IMAGEM DA PERSONAGEM -->
                <img src="" alt="Clawdeen">


                <!-- SKULL -->
                <div class="skull">

                    <img src="" alt="Skull Clawdeen">

                </div>


                <div class="nome">

                    Clawdeen Wolf

                </div>

            </div>





            <!-- ================================================= -->
            <!-- LAGOONA -->
            <!-- ================================================= -->

            <div class="card" onclick="mostrarAluno('lagoona')">


                <!-- IMAGEM DA PERSONAGEM -->
                <img src="" alt="Lagoona">


                <!-- SKULL -->
                <div class="skull">

                    <img src="" alt="Skull Lagoona">

                </div>


                <div class="nome">

                    Lagoona Blue

                </div>

            </div>


        </div>






        <!-- ================================================= -->
        <!-- ÁREA DE DESCRIÇÃO -->
        <!-- ================================================= -->

        <div class="descricao" id="descricaoAluno">


            <!-- 
                AQUI VAI APARECER:
                - Nome
                - Skull
                - Aniversário
                - Curiosidade
                - História
            -->


            <!-- SKULL DA PERSONAGEM SELECIONADA -->
            <div class="skull-info">

                <img id="imagemSkull" src="" alt="Skull">

            </div>



            <h2 id="nomeAluno"></h2>


            <p>

                <span>Aniversário:</span>

                <span id="aniversario"></span>

            </p>



            <p>

                <span>Curiosidade:</span>

                <span id="curiosidade"></span>

            </p>



            <p>

                <span>História:</span>

                <span id="historia"></span>

            </p>


        </div>

    </div>






<script>


const alunos = {


    frankie: {

        nome: 'Frankie Stein',

        aniversario: '15 de Junho',

        curiosidade: 'Foi criada a partir de várias partes diferentes e adora tecnologia.',

        historia: 'Frankie é filha do Frankenstein e ainda está descobrindo como o mundo funciona.',


        /*
            COLOQUE A IMAGEM DA SKULL DA FRANKIE
        */

        skull: ''

    },





    draculaura: {

        nome: 'Draculaura',

        aniversario: '14 de Fevereiro',

        curiosidade: 'Mesmo sendo filha do Drácula, ela não bebe sangue.',

        historia: 'Draculaura ama moda e sempre tenta ver o lado positivo das coisas.',


        /*
            COLOQUE A IMAGEM DA SKULL DA DRACULAURA
        */

        skull: ''

    },






    clawdeen: {

        nome: 'Clawdeen Wolf',

        aniversario: '30 de Abril',

        curiosidade: 'Sonha em ter sua própria marca de roupas.',

        historia: 'Clawdeen possui uma personalidade forte e muito estilosa.',


        /*
            COLOQUE A IMAGEM DA SKULL DA CLAWDEEN
        */

        skull: ''

    },







    lagoona: {

        nome: 'Lagoona Blue',

        aniversario: '24 de Junho',

        curiosidade: 'Ama esportes aquáticos e animais marinhos.',

        historia: 'Lagoona veio do oceano e é conhecida por ser calma e amigável.',


        /*
            COLOQUE A IMAGEM DA SKULL DA LAGOONA
        */

        skull: ''

    }

}






function mostrarAluno(personagem){


    document.getElementById('descricaoAluno').style.display = 'block';


    document.getElementById('nomeAluno').innerHTML = alunos[personagem].nome;


    document.getElementById('aniversario').innerHTML = alunos[personagem].aniversario;


    document.getElementById('curiosidade').innerHTML = alunos[personagem].curiosidade;


    document.getElementById('historia').innerHTML = alunos[personagem].historia;



    /*
        TROCA A SKULL QUANDO CLICA
    */

    document.getElementById('imagemSkull').src = alunos[personagem].skull;


}


</script>

</body>
</html>
