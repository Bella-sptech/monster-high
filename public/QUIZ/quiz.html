let atual = 0;
let respostas = [];

// Mapeando os elementos do HTML que vamos manipular
const elPergunta  = document.getElementById("pergunta");
const elDescricao = document.getElementById("descricao");
const elOpcoes    = document.getElementById("opcoes");
const elResultado = document.getElementById("resultado");
const btnProx     = document.getElementById("btnProx");
const btnReiniciar = document.getElementById("btnReiniciar");

// ============================================================
// FUNÇÃO: carregar()
// Exibe a pergunta atual na tela com suas opções
// ============================================================
function carregar() {
    let questao = perguntas[atual];
    elPergunta.innerHTML  = `<h3>${questao.pergunta}</h3>`;
    elDescricao.innerHTML = `<p>${questao.descricao}</p>`;
    elOpcoes.innerHTML    = "";
    
    questao.opcoes.forEach((texto, index) => {
        elOpcoes.innerHTML += `
            <label class="opcao-label">
                <input type="radio" name="opt" value="${index}"> ${texto}
            </label><br>
        `;
    });
}

// ============================================================
// FUNÇÃO: proxima()
// Verifica se o usuário escolheu uma opção e avança
// ============================================================
function proxima() {
    let opcoesRadio = document.getElementsByName("opt");
    let escolhido = -1;
    
    for (let i = 0; i < opcoesRadio.length; i++) {
        if (opcoesRadio[i].checked) {
            escolhido = parseInt(opcoesRadio[i].value);
        }
    }
    
    if (escolhido === -1) {
        alert("Escolha uma opção para continuar!");
        return;
    }
    
    respostas.push(escolhido);
    atual++;
    
    if (atual < perguntas.length) {
        carregar();
    } else {
        finalizar();
    }
}

// ============================================================
// FUNÇÃO: finalizar()
// Conta os votos, mostra o resultado e salva no banco
// ============================================================
async function finalizar() {

    // 1. Limpa a tela para mostrar o resultado
    elPergunta.innerHTML = "<h2>Sua personagem Monster High é...</h2>";
    elDescricao.innerHTML = "";
    elOpcoes.innerHTML = "";
    btnProx.style.display = "none";
    btnReiniciar.style.display = "inline-block";

    // 2. Zera os votos de cada personagem
    let votosFrankie    = 0;
    let votosDraculaura = 0;
    let votosClawdeen   = 0;
    let votosCleo       = 0;
    let votosLagoona    = 0;
    let votosGhoulia    = 0;

    // 3. Percorre todas as respostas e soma os votos
    // Índice 0 = Frankie, 1 = Draculaura, 2 = Clawdeen,
    // 3 = Cleo, 4 = Lagoona, 5 = Ghoulia
    for (let i = 0; i < respostas.length; i++) {
        let votoAtual = respostas[i];

        if (votoAtual == 0)      { votosFrankie++;    }
        else if (votoAtual == 1) { votosDraculaura++; }
        else if (votoAtual == 2) { votosClawdeen++;   }
        else if (votoAtual == 3) { votosCleo++;       }
        else if (votoAtual == 4) { votosLagoona++;    }
        else if (votoAtual == 5) { votosGhoulia++;    }
    }

    // 4. Descobre a personagem VENCEDORA (mais votos)
    let numeroSecoVencedor = votosFrankie;
    let personagemVencedora = personagensInfo[0];

    if (votosDraculaura > numeroSecoVencedor) { numeroSecoVencedor = votosDraculaura; personagemVencedora = personagensInfo[1]; }
    if (votosClawdeen   > numeroSecoVencedor) { numeroSecoVencedor = votosClawdeen;   personagemVencedora = personagensInfo[2]; }
    if (votosCleo       > numeroSecoVencedor) { numeroSecoVencedor = votosCleo;       personagemVencedora = personagensInfo[3]; }
    if (votosLagoona    > numeroSecoVencedor) { numeroSecoVencedor = votosLagoona;    personagemVencedora = personagensInfo[4]; }
    if (votosGhoulia    > numeroSecoVencedor) { numeroSecoVencedor = votosGhoulia;    personagemVencedora = personagensInfo[5]; }

    // 5. NOVO: Descobre a personagem PERDEDORA (menos votos)
    // Começa achando que a Frankie tem menos votos e vai comparando
    let numeroSecoPerdedor = votosFrankie;
    let personagemPerdedora = personagensInfo[0];

    if (votosDraculaura < numeroSecoPerdedor) { numeroSecoPerdedor = votosDraculaura; personagemPerdedora = personagensInfo[1]; }
    if (votosClawdeen   < numeroSecoPerdedor) { numeroSecoPerdedor = votosClawdeen;   personagemPerdedora = personagensInfo[2]; }
    if (votosCleo       < numeroSecoPerdedor) { numeroSecoPerdedor = votosCleo;       personagemPerdedora = personagensInfo[3]; }
    if (votosLagoona    < numeroSecoPerdedor) { numeroSecoPerdedor = votosLagoona;    personagemPerdedora = personagensInfo[4]; }
    if (votosGhoulia    < numeroSecoPerdedor) { numeroSecoPerdedor = votosGhoulia;    personagemPerdedora = personagensInfo[5]; }

    // 6. Mostra o resultado na tela
    elResultado.innerHTML = `
        <div style="text-align: center; margin-top: 20px;">
            <img src="${personagemVencedora.imagem}" style="width: 220px; border-radius: 15px; margin-bottom: 15px;">
            <br>
            <h2 style="color: #e6007e;">${personagemVencedora.nome}</h2>
            <p>${personagemVencedora.motivo}</p>
            <strong style="color: #00ccff;">Pontuação final: Você escolheu as opções dela ${numeroSecoVencedor} vezes!</strong>
        </div>
    `;

    // 7. Pega o ID do usuário logado no localStorage
    let idUsuario = localStorage.getItem("idUsuario");

    try {
        // 8. PRIMEIRO fetch: salva o resultado principal no banco (personagem vencedora)
        let respostaResultado = await fetch("/resultadoquiz/cadastrar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                porcentagemFinal: numeroSecoVencedor,
                dataResultado: new Date().toISOString().slice(0, 19).replace('T', ' '),
                fkUsuario: idUsuario,
                fkPersonagem: personagemVencedora.id
            })
        });

        if (respostaResultado.ok) {
            console.log("Resultado salvo com sucesso!");

            // 9. Pega o ID do resultado que acabou de ser inserido no banco
            // O MySQL retorna "insertId" com o id gerado automaticamente
            let dadosResultado = await respostaResultado.json();
            let idResultadoSalvo = dadosResultado.insertId;

            // 10. SEGUNDO fetch: salva o placar completo de votos de cada personagem
            // Isso é o que vai alimentar o card VERMELHO do dashboard (menos votada)
            let respostaPlacar = await fetch("/placarquiz/cadastrar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    votosFrankie:    votosFrankie,
                    votosDraculaura: votosDraculaura,
                    votosClawdeen:   votosClawdeen,
                    votosCleo:       votosCleo,
                    votosLagoona:    votosLagoona,
                    votosGhoulia:    votosGhoulia,
                    fkUsuario:       idUsuario,
                    fkResultadoQuiz: idResultadoSalvo  // Liga o placar ao resultado
                })
            });

            if (respostaPlacar.ok) {
                console.log("Placar completo salvo com sucesso!");
            } else {
                console.error("Erro ao salvar o placar.");
            }

        } else {
            console.error("O servidor respondeu com erro ao salvar o resultado.");
        }

    } catch (erro) {
        console.error("Erro na requisição:", erro);
    }

    // 11. Aguarda 5 segundos mostrando o resultado e redireciona para o dashboard
    setTimeout(function () {
        window.location.href = "../dashboard/dashboard1.html";
    }, 5000);
}

// ============================================================
// FUNÇÃO: reiniciar()
// Volta o quiz para o início
// ============================================================
function reiniciar() {
    atual = 0;

    elResultado.innerHTML = "";
    btnReiniciar.style.display = "none";
    btnProx.style.display = "inline-block";

}
