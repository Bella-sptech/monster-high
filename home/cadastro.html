
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="cadastro.css">
    <title>CADASTRO</title>
</head>
<body>
    <!--botão de voltar-->
    <div class=" voltar">
    <a href="index.html"><i class="fa-solid fa-angles-left"></i></a>
\   </div>

        <!--container é minha caixa -->
    <main class="container">
        <h1><i class="fa-solid fa-skull-crossbones"></i>CADASTRO<i class="fa-solid fa-skull-crossbones"></i></h1>

        <div class= "campo"> <!-- aqui são meus campos-->
            <span>Nome:<i class="fa-solid fa-user"></i></span>
            <input type="text" placeholder="Insira seu nome completo"  id="ipt_data">
        </div>
        <div class="campo">
            <span>Digite sua data de nascimento<i class="fa-solid fa-calendar-days"></i></span>
            <input type="date"  id="ipt_data">
        </div>
         <div class="campo">
            <span>Digite seu email:<i class="fa-solid fa-at"></i></span>
            <input type="text" placeholder="meuemail@provedor.com" id="ipt_email">
        </div>
        <div class="campo">
            <span>Senha:<i class="fa-solid fa-lock"></i></span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
        <div class="campo">
            <span>Confirmação da Senha:<i class="fa-solid fa-lock"></i></span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>

      
        <!--Botão de Cadastrar-->
        <button class="botao" type="submit">Cadastrar
            <i class="fa-solid fa-spider"></i>
        </button>

        <!--aba para ir pro login-->
        <div>
          <br>
            <p>Já tem conta?<a class="link" href="login.html">Entrar</a></p>
        </div>

        <!--meu exibir, mas acho que vou usar alert-->
        <div id="exibir"></div>

        <!-- Acrescentar mais com logar com e os elementos -->
    </main>
</body>
</html>
