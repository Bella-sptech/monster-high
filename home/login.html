<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <title>LOGIN</title>
</head>
<body>
    <!--botão de voltar-->
    <div class=" voltar">
    <a href="index.html"><i class="fa-solid fa-angles-left"></i></a>
\   </div>

        <!--container é minha caixa -->
    <main class="container">
        <h1><i class="fa-solid fa-skull-crossbones"></i>Login<i class="fa-solid fa-skull-crossbones"></i></h1>
        <div class= "input-box"> <!-- aqui são meus campos-->
            <span>Digite seu email<i class="fa-solid fa-user"></i></span>
            <input placeholder="Usuário" type="email">
        </div>
        <div class="input-box">
            <span>Digite sua senha<i class="fa-solid fa-lock"></i></span>
            <input placeholder="senha" type="password">
        </div>

        <!-- lembrar é meu label-->
        <div class="lembrar">
             <label>
                <input type="checkbox">Lembrar minha senha
            </label>
        </div>
        <!--Botão de Entrar-->
        <button class="botao" type="submit">Entrar
            <i class="fa-solid fa-spider"></i>
        </button>

        <!--abas , são meus links comuns de login-->
        <div class="abas">
            <a class="link" href="#">Esqueci minha senha</a>
        </div>
        <br>
        <div>
            <p>Não tem conta?<a class="link" href="cadastro.html">Cadastre-se</a></p>
        </div>

        <!--meu exibir, mas acho que vou usar alert-->
        <div id="exibir"></div>

        <!-- Acrescentar mais com logar com e os elementos -->
    </main>
</body>
</html>
